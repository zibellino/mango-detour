name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Read app config
        id: appcfg
        run: |
          APP_NAME=$(grep '^app.name=' app.properties | cut -d'=' -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RAW_VERSION="${{ github.head_ref }}"
          else
            RAW_VERSION="${{ github.ref_name }}"
          fi
          VERSION_NAME=$(echo "$RAW_VERSION" | tr '/' '-')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache signing keystore
        uses: actions/cache@v5
        with:
          path: ~/.android/debug.keystore
          key: signing-keystore-v1

      - name: Generate debug keystore if not cached
        run: |
          if [ ! -f ~/.android/debug.keystore ]; then
            mkdir -p ~/.android
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey \
              -keypass android -keyalg RSA -keysize 2048 -validity 36500 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: >
          ./gradlew assembleRelease
          -PappVersionCode=${{ steps.ver.outputs.version_code }}
          -PappVersionName=${{ steps.ver.outputs.version_name }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.appcfg.outputs.app_name }}-${{ steps.ver.outputs.version_name }}-${{ steps.ver.outputs.short_sha }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

  publish_release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Read app config
        id: appcfg
        run: |
          APP_NAME=$(grep '^app.name=' app.properties | cut -d'=' -f2)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Download latest master build artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          branch: master
          name_is_regexp: true
          name: ${{ steps.appcfg.outputs.app_name }}-master-.*
          path: downloaded
          search_artifacts: true

      - name: Rename APK for release
        run: |
          SRC=$(find downloaded -name '*.apk' | head -n1)
          mv "$SRC" "${{ steps.appcfg.outputs.app_name }}-${{ github.event.release.tag_name }}.apk"

      - name: Attach APK to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.appcfg.outputs.app_name }}-${{ github.event.release.tag_name }}.apk
          
